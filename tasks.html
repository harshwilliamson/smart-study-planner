<!DOCTYPE html>
<html lang="en">
<head>
  <title>Tasks</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/app.js" defer></script>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <h2>🎓 Smart Study Planner</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="tasks.html">Tasks</a>
    <a href="progress.html">Progress</a>
  </div>
</nav>

<div class="container">

  <!-- TASK INPUT -->
  <div class="card">
    <h2>📋 Task Manager</h2>
    <p>Enter new tasks or manage existing ones</p>

    <div class="form-group">
      <input id="taskName" placeholder="Enter task">
      <input id="taskDate" type="date">

      <select id="priority">
        <option>High</option>
        <option>Medium</option>
        <option>Low</option>
      </select>

      <button onclick="addTask()">Add Task</button>
    </div>
  </div>

  <!-- TASK LIST -->
  <div class="card">
    <h3>📌 All Tasks</h3>
    <div id="taskList"></div>
  </div>

</div>

<!-- FOOTER -->
<footer class="footer">
  <p>© 2026 Smart Study Planner</p>
</footer>

<script>
  renderTasks();
</script>
<!-- FLOATING NOTES BUTTON -->
<button id="notesBtn" onclick="toggleNotes()">📝 Notes</button>

<!-- FLOATING NOTES PANEL -->
<div id="notesPanel">
  <div class="notes-header">
    <span>📝 Notes</span>
    <button onclick="toggleNotes()">✖</button>
  </div>

  <iframe 
    src="http://localhost:3000"
    style="width:100%; height:100%; border:none;">
  </iframe>
</div>
</body>
</html>
